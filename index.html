<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>バーコード管理</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #0d0f14;
  color: #fff;
  display: flex;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 500px;
  text-align: center;
  margin-top: 40px;
}

h1 {
  font-weight: 500;
  margin-bottom: 30px;
}

/* 入力欄 */
.input-box {
  background: #1a1d25;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #2a2e3a;
  color: white;
}

/* ボタン */
button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #3a7bfd;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #5c95ff;
}

/* 表 */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  background: #1a1d25;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
}

/* スキャン枠 */
#reader {
  margin-top: 20px;
  border: 2px dashed #444;
  border-radius: 15px;
  padding: 10px;
}

/* リスト */
ul {
  list-style: none;
  padding: 0;
}

li {
  background: #1a1d25;
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>バーコード管理</h1>

  <div class="input-box">
    <input id="barcode" placeholder="バーコード">
    <input id="name" placeholder="名前">
    <button onclick="addData()">登録</button>
  </div>

  <table id="table"></table>

  <div id="reader"></div>

  <h3>読み取り履歴</h3>
  <ul id="scanList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔴 Firebase貼る */
const firebaseConfig = {
  apiKey: "ここ",
  authDomain: "ここ",
  projectId: "ここ",
  storageBucket: "ここ",
  messagingSenderId: "ここ",
  appId: "ここ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 登録 */
window.addData = async function() {
  const barcode = document.getElementById("barcode").value;
  const name = document.getElementById("name").value;

  if (!barcode || !name) return;

  await addDoc(collection(db, "items"), { barcode, name });

  document.getElementById("barcode").value = "";
  document.getElementById("name").value = "";
};

/* 表表示 */
onSnapshot(collection(db, "items"), (snapshot) => {
  const table = document.getElementById("table");
  table.innerHTML = "<tr><th>バーコード</th><th>名前</th></tr>";

  snapshot.forEach(doc => {
    const data = doc.data();
    table.innerHTML += `<tr><td>${data.barcode}</td><td>${data.name}</td></tr>`;
  });
});

/* スキャン */
let scanned = [];

function onScanSuccess(text) {
  scanned.push(text);
  renderList();
}

function renderList() {
  const ul = document.getElementById("scanList");
  ul.innerHTML = "";

  scanned.forEach(v => {
    const li = document.createElement("li");
    li.textContent = v;
    ul.appendChild(li);
  });
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);
</script>

</body>
</html>
