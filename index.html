<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チェック管理</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0d0f14;
  color: white;
  display: flex;
}

/* 左：ジャンル */
.sidebar {
  width: 220px;
  background: #141821;
  padding: 15px;
}

.genre {
  padding: 12px;
  margin: 5px 0;
  border-radius: 10px;
  background: #1f2430;
  cursor: pointer;
}

.genre.active {
  background: #3a7bfd;
}

/* 右：メイン */
.main {
  flex: 1;
  padding: 20px;
}

/* グリッド表示 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
}

/* カード */
.card {
  background: #1a1d25;
  padding: 15px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

/* 選択状態 */
.card.active {
  background: #2ecc71;
  color: black;
}

/* コード */
.code {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- 左 -->
<div class="sidebar" id="sidebar"></div>

<!-- 右 -->
<div class="main">
  <div class="grid" id="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtFDiA62RL6zQLS7AotA4hYj1dTgGQOkQ",
  authDomain: "hozonkinou.firebaseapp.com",
  projectId: "hozonkinou",
  storageBucket: "hozonkinou.firebasestorage.app",
  messagingSenderId: "125594371105",
  appId: "1:125594371105:web:616b4e80165cd4d9674f60",
  measurementId: "G-479YDRLXLB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* データ（自由に編集OK） */
const data = {
  "フルーツ": [
    { code: "001", name: "りんご" },
    { code: "002", name: "みかん" },
    { code: "003", name: "バナナ" }
  ],
  "飲み物": [
    { code: "101", name: "水" },
    { code: "102", name: "コーラ" },
    { code: "103", name: "お茶" }
  ]
};

let currentGenre = Object.keys(data)[0];
let states = {}; // チェック状態

/* ジャンル表示 */
function renderGenres() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  Object.keys(data).forEach(g => {
    const div = document.createElement("div");
    div.className = "genre " + (g === currentGenre ? "active" : "");
    div.textContent = g;
    div.onclick = () => {
      currentGenre = g;
      renderGenres();
      renderGrid();
    };
    sidebar.appendChild(div);
  });
}

/* 右側表示 */
function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data[currentGenre].forEach(item => {
    const key = currentGenre + "_" + item.code;
    const active = states[key];

    const div = document.createElement("div");
    div.className = "card " + (active ? "active" : "");
    div.innerHTML = `
      <div>${item.name}</div>
      <div class="code">${item.code}</div>
    `;

    div.onclick = async () => {
      states[key] = !states[key];
      await setDoc(doc(db, "checks", key), { checked: states[key] });
      renderGrid();
    };

    grid.appendChild(div);
  });
}

/* 状態読み込み */
async function loadStates() {
  const snap = await getDocs(collection(db, "checks"));
  snap.forEach(d => {
    states[d.id] = d.data().checked;
  });

  renderGenres();
  renderGrid();
}

loadStates();
</script>

</body>
</html>
