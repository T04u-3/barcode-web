<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>バーコード管理</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0d0f14;
  color: white;
  display: flex;
}

/* 左パネル */
.sidebar {
  width: 280px;
  padding: 20px;
  background: #141821;
  height: 100vh;
  box-sizing: border-box;
}

.sidebar h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2a2e3a;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #3a7bfd;
  color: white;
  cursor: pointer;
}

/* 右エリア */
.main {
  flex: 1;
  padding: 20px;
}

/* タブ */
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  background: #1a1d25;
  border-radius: 10px;
  cursor: pointer;
}

.tab.active {
  background: #3a7bfd;
}

/* 表 */
table {
  width: 100%;
  border-collapse: collapse;
  background: #1a1d25;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
}

/* スキャン */
#reader {
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- 左 -->
<div class="sidebar">
  <h2>管理</h2>

  <input id="barcode" placeholder="バーコード">
  <input id="name" placeholder="名前">
  <button onclick="addData()">登録</button>

  <div id="reader"></div>
</div>

<!-- 右 -->
<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="showTab('items')">登録データ</div>
    <div class="tab" onclick="showTab('scans')">読み取り結果</div>
  </div>

  <div id="itemsTable"></div>
  <div id="scanTable" style="display:none;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase設定 */
const firebaseConfig = {
  apiKey: "ここ",
  authDomain: "ここ",
  projectId: "ここ",
  storageBucket: "ここ",
  messagingSenderId: "ここ",
  appId: "ここ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 登録 */
window.addData = async function() {
  const barcode = document.getElementById("barcode").value;
  const name = document.getElementById("name").value;

  if (!barcode || !name) return;

  await addDoc(collection(db, "items"), { barcode, name });

  document.getElementById("barcode").value = "";
  document.getElementById("name").value = "";
};

/* 登録データ表示 */
onSnapshot(collection(db, "items"), (snapshot) => {
  let html = "<table><tr><th>バーコード</th><th>名前</th></tr>";

  snapshot.forEach(doc => {
    const d = doc.data();
    html += `<tr><td>${d.barcode}</td><td>${d.name}</td></tr>`;
  });

  html += "</table>";
  document.getElementById("itemsTable").innerHTML = html;
});

/* スキャン */
let scanResults = [];

async function onScanSuccess(code) {
  const snapshot = await getDocs(collection(db, "items"));
  let name = "未登録";

  snapshot.forEach(doc => {
    const d = doc.data();
    if (d.barcode === code) {
      name = d.name;
    }
  });

  scanResults.push({ code, name });
  renderScanTable();
}

function renderScanTable() {
  let html = "<table><tr><th>バーコード</th><th>名前</th></tr>";

  scanResults.forEach(v => {
    html += `<tr><td>${v.code}</td><td>${v.name}</td></tr>`;
  });

  html += "</table>";
  document.getElementById("scanTable").innerHTML = html;
}

/* タブ切替 */
window.showTab = function(tab) {
  document.getElementById("itemsTable").style.display = tab === "items" ? "block" : "none";
  document.getElementById("scanTable").style.display = tab === "scans" ? "block" : "none";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
};

/* カメラ */
const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 200 },
  onScanSuccess
);
</script>

</body>
</html>
